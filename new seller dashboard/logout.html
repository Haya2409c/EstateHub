<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate Hub | Logout</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F8F7F4] text-[#1a1a2e]">

            <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

      <!-- Logo -->
      <div class="sidebar-logo">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#2563EB,#1E3A5F);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="fas fa-building" style="color:#FFFFFF;font-size:1rem;"></i>
        </div>
        <div>
          <div class="sidebar-logo-text">Estate Hub</div>
          <div class="sidebar-logo-sub">Seller Dashboard</div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav">

        <!-- Main -->
        <div class="nav-section-label">Main</div>

        <a href="index.html" class="nav-item" data-page="index.html">
          <i class="fas fa-gauge-high"></i>
          <span>Dashboard</span>
        </a>

        <!-- Properties Section -->
        <div class="nav-section-label">Properties</div>

        <a href="my-properties.html" class="nav-item" data-page="my-properties.html">
          <i class="fas fa-house"></i>
          <span>My Properties</span>
        </a>

        <div class="nav-sub">
          <a href="add-property.html" class="nav-item" data-page="add-property.html">
            <i class="fas fa-plus"></i>
            <span>Add Property</span>
          </a>
        </div>

        <!-- Media -->
        <div class="nav-section-label">Media</div>

        <a href="media.html" class="nav-item" data-page="media.html">
          <i class="fas fa-images"></i>
          <span>Property Images</span>
        </a>

        <!-- Account -->
        <div class="nav-section-label">Account</div>

        <a href="packages.html" class="nav-item" data-page="packages.html">
          <i class="fas fa-credit-card"></i>
          <span>Packages</span>
        </a>

        <a href="profile.html" class="nav-item" data-page="profile.html">
          <i class="fas fa-user-gear"></i>
          <span>Profile Settings</span>
        </a>

      </nav>

      <!-- Sidebar User + Logout -->
      <div class="sidebar-bottom">

        <!-- Logged-in user info -->
        <div class="sidebar-user">
          <div class="sidebar-avatar">AK</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">Ahmed Khan</div>
            <div class="sidebar-user-role">Seller Account</div>
          </div>
        </div>

        <!-- Logout -->
        <a href="logout.html" class="nav-item nav-item-logout" data-page="logout.html">
          <i class="fas fa-right-from-bracket"></i>
          <span>Logout</span>
        </a>

      </div>

    </aside>

    <!-- Main Content Wrapper -->
    <div class="main-content-wrapper min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="h-[70px] bg-white border-b border-[#1E3A5F]/15 flex items-center justify-between px-6 sticky top-0 z-30">
            <div class="flex items-center">
                <button id="mobileMenuBtn" class="lg:hidden text-[#1E3A5F] text-xl mr-4 focus:outline-none">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 class="font-outfit font-semibold text-[#1E3A5F] text-xl">Logout</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 border-l pl-6 border-[#1E3A5F]/15">
                    <img src="https://ui-avatars.com/api/?name=Seller+Account&background=1E3A5F&color=fff" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 p-6 flex flex-col items-center justify-center relative min-h-[calc(100vh-70px)]">
            
            <div class="glass-panel p-8 md:p-10 w-full max-w-[400px] text-center shadow-xl transform -translate-y-10 relative z-10">
                <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <i class="fa-solid fa-door-open text-3xl text-red-500"></i>
                </div>
                
                <h2 class="font-outfit font-bold text-2xl text-[#1E3A5F] mb-3">Logout Confirmation</h2>
                <p class="font-poppins text-[#718096] mb-8 leading-relaxed">Kya aap waqai logout karna chahte hain? Aapko dobara login karna parega.</p>
                
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="index.html" class="btn-outline-navy flex-1 py-3 order-2 sm:order-1">Cancel</a>
                    <a href="#" onclick="showToast('Logging out...', 'success'); setTimeout(()=>window.location='index.html', 1000);" class="btn-gold bg-red-500 hover:bg-red-600 border-none flex-1 py-3 order-1 sm:order-2 shadow-md">
                        Yes, Logout
                    </a>
                </div>
            </div>

            <!-- Decorative background elements -->
            <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-[#2563EB]/5 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-[#1E3A5F]/5 rounded-full blur-3xl pointer-events-none"></div>

        </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script src="js/dashboard.js"></script>
</body>
</html>
