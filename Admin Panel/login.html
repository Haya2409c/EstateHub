<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Admin Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        navy: { 900: '#060B19', 800: '#0B132B', 700: '#1C2541', 600: '#3A506B' },
                        gold: { 400: '#F1C40F', 500: '#D4AF37', 600: '#AA8C2C' }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        body { @apply bg-navy-900 text-white; }
        .form-input {
            @apply w-full bg-navy-900 border border-navy-700 rounded-lg px-4 py-3 text-sm text-white
                   focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500
                   transition-colors placeholder-gray-500;
        }
        .glass-card { @apply bg-navy-800/80 backdrop-blur-md border border-navy-700 shadow-glass; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-navy-900 relative overflow-hidden">

    <!-- Background glow orbs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-80 h-80 bg-gold-500/5 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-gold-500/5 rounded-full blur-3xl"></div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Login Card -->
    <div class="relative w-full max-w-md mx-auto px-4">
        <div class="glass-card rounded-2xl p-8 sm:p-10">

            <!-- Logo -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="w-10 h-10 rounded-xl bg-gold-500 flex items-center justify-center text-navy-900 font-bold text-lg shadow-lg">L</div>
                <span class="font-semibold text-xl tracking-wide text-white">Admin Portal</span>
            </div>

            <!-- Heading -->
            <div class="mb-8 text-center">
                <h1 class="text-2xl font-bold text-white">Welcome back</h1>
                <p class="text-sm text-gray-400 mt-1">Sign in to your admin account</p>
            </div>

            <!-- Error banner (hidden by default) -->
            <div id="error-banner" class="hidden mb-5 flex items-center gap-3 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                <span id="error-text">Invalid credentials.</span>
            </div>

            <!-- Login Form -->
            <form id="login-form" novalidate class="space-y-5">

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email address</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </span>
                        <input type="email" id="email" name="email" required autocomplete="email"
                               placeholder="admin@example.com"
                               class="form-input pl-10">
                    </div>
                    <p class="error-msg hidden text-red-400 text-xs mt-1"></p>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                               placeholder="••••••••"
                               class="form-input pl-10 pr-10">
                        <button type="button" id="toggle-password"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <p class="error-msg hidden text-red-400 text-xs mt-1"></p>
                </div>

                <!-- Remember me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer select-none">
                        <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-navy-600 text-gold-500 focus:ring-gold-500 bg-navy-900">
                        <span class="text-sm text-gray-300">Remember me</span>
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" id="login-btn"
                        class="w-full py-3 rounded-xl bg-gold-500 hover:bg-gold-600 text-navy-900 font-semibold
                               transition-colors flex items-center justify-center gap-2 shadow-lg shadow-gold-500/20 mt-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Sign In
                </button>
            </form>

            <!-- Footer note -->
            <p class="text-xs text-gray-600 text-center mt-8">
                Admin access only. Unauthorised access is prohibited.
            </p>
        </div>
    </div>

    <!-- auth.js (declares API_BASE + TokenStore) -->
    <script src="js/auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect to dashboard if already logged in
            if (typeof TokenStore !== 'undefined' &&
                TokenStore.getAccess() && !TokenStore.isExpired()) {
                window.location.href = 'index.html';
                return;
            }

            lucide.createIcons();

            const form       = document.getElementById('login-form');
            const loginBtn   = document.getElementById('login-btn');
            const emailEl    = document.getElementById('email');
            const passwordEl = document.getElementById('password');
            const togglePwd  = document.getElementById('toggle-password');
            const errorBanner = document.getElementById('error-banner');
            const errorText   = document.getElementById('error-text');

            // Show toast helper (inline — shared.js not loaded here)
            function showToast(msg, type = 'success') {
                const container = document.getElementById('toast-container');
                const colors = {
                    success: 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400',
                    error:   'bg-red-500/10    border-red-500/20    text-red-400',
                    info:    'bg-blue-500/10   border-blue-500/20   text-blue-400',
                };
                const icons = { success: 'check-circle', error: 'alert-circle', info: 'info' };
                const div = document.createElement('div');
                div.className = `flex items-center gap-2 px-4 py-3 rounded-lg border backdrop-blur-md shadow-lg transition-all transform translate-x-full ${colors[type] || colors.info}`;
                div.innerHTML = `<i data-lucide="${icons[type] || 'info'}" class="w-5 h-5"></i><span>${msg}</span>`;
                container.appendChild(div);
                lucide.createIcons();
                setTimeout(() => div.classList.remove('translate-x-full'), 10);
                setTimeout(() => { div.classList.add('opacity-0'); setTimeout(() => div.remove(), 300); }, 3500);
            }

            // Toggle password visibility
            togglePwd.addEventListener('click', () => {
                const isPassword = passwordEl.type === 'password';
                passwordEl.type = isPassword ? 'text' : 'password';
                togglePwd.innerHTML = isPassword
                    ? '<i data-lucide="eye-off" class="w-4 h-4"></i>'
                    : '<i data-lucide="eye" class="w-4 h-4"></i>';
                lucide.createIcons();
            });

            // Validate fields
            function validate() {
                let ok = true;
                [emailEl, passwordEl].forEach(el => {
                    const err = el.closest('div').nextElementSibling;
                    el.classList.remove('border-red-500');
                    if (err) err.classList.add('hidden');
                });

                if (!emailEl.value.trim()) {
                    mark(emailEl, 'Email is required');
                    ok = false;
                } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
                    mark(emailEl, 'Enter a valid email');
                    ok = false;
                }

                if (!passwordEl.value) {
                    mark(passwordEl, 'Password is required');
                    ok = false;
                }
                return ok;
            }

            function mark(el, msg) {
                el.classList.add('border-red-500');
                const err = el.closest('div').nextElementSibling;
                if (err) { err.textContent = msg; err.classList.remove('hidden'); }
            }

            function setLoading(loading) {
                loginBtn.disabled = loading;
                loginBtn.innerHTML = loading
                    ? '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Signing in...'
                    : '<i data-lucide="log-in" class="w-4 h-4"></i> Sign In';
                lucide.createIcons();
            }

            function showError(msg) {
                errorText.textContent = msg;
                errorBanner.classList.remove('hidden');
                errorBanner.classList.add('flex');
                lucide.createIcons();
            }

            function hideError() {
                errorBanner.classList.add('hidden');
                errorBanner.classList.remove('flex');
            }

            // Form submit
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideError();
                if (!validate()) return;

                setLoading(true);

                try {
                    const res = await fetch(`${API_BASE}/api/auth/admin/login`, {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body:    JSON.stringify({
                            email:    emailEl.value.trim(),
                            password: passwordEl.value
                        })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        showError(data?.error || 'Login failed. Check your credentials.');
                        return;
                    }

                    // Persist tokens
                    TokenStore.save(data.accessToken, data.refreshToken, data.expiresAt, data.user);

                    showToast('Login successful! Redirecting…', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);

                } catch (err) {
                    showError('Cannot reach the server. Make sure the backend is running.');
                } finally {
                    setLoading(false);
                }
            });

            // Clear error on input
            [emailEl, passwordEl].forEach(el => {
                el.addEventListener('input', hideError);
            });
        });
    </script>
</body>
</html>
